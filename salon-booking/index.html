<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="拾形造型 — 線上預約" />
    <meta property="og:description" content="拾形造型線上預約系統，快速完成預約！" />
    <meta property="og:type" content="website" />
    <meta name="description" content="拾形造型線上預約系統" />
    <title>拾形造型 — 線上預約</title>
    <style>
      input[type="date"]::-webkit-datetime-edit-text,
      input[type="date"]::-webkit-datetime-edit-month-field,
      input[type="date"]::-webkit-datetime-edit-day-field,
      input[type="date"]::-webkit-datetime-edit-year-field {
        color: rgba(44,44,44,0.35);
      }
      input[type="date"]:not([value=""])::-webkit-datetime-edit-text,
      input[type="date"]:not([value=""])::-webkit-datetime-edit-month-field,
      input[type="date"]:not([value=""])::-webkit-datetime-edit-day-field,
      input[type="date"]:not([value=""])::-webkit-datetime-edit-year-field {
        color: #2c2c2c;
      }
      input[type="date"] {
        -webkit-appearance: none;
        appearance: none;
        display: block;
        min-height: 46px;
      }
      input[type="date"]::-webkit-date-and-time-value {
        text-align: left;
        color: #2c2c2c;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
